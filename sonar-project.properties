# SonarQube / SonarScanner configuration for mod_fastpix.
#
# Moodle activity module. Follows Moodle's coding standard (enforced by
# moodle-plugin-ci: phpcs + eslint). Several default SonarWay rules conflict
# with mandatory Moodle conventions or with intentional, audited code; they are
# excluded below. The IDE equivalents are application-scoped and live in the
# user's VS Code settings (SonarLint can't read them from a repo file).

sonar.projectKey=mod_fastpix
sonar.projectName=mod_fastpix
sonar.sources=.
sonar.sourceEncoding=UTF-8

# Generated AMD bundles and minified assets are not ours.
sonar.exclusions=amd/build/**,**/*.min.js

sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6,e7,e8,e9

# --- Moodle PHP naming (same rationale as local_fastpix) ---
# S101/S100: Moodle Frankenstyle mandates snake_case class/method names for the
# autoloader and lib.php callback dispatch (e.g. fastpix_add_instance).
sonar.issue.ignore.multicriteria.e1.ruleKey=php:S101
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.php
sonar.issue.ignore.multicriteria.e2.ruleKey=php:S100
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.php

# --- Browser / Moodle-AMD JavaScript conventions ---
# S7764: `window` is the correct browser global and the universal Moodle AMD
# idiom; the globalThis preference targets isomorphic node+browser code.
sonar.issue.ignore.multicriteria.e3.ruleKey=javascript:S7764
sonar.issue.ignore.multicriteria.e3.resourceKey=amd/src/**/*.js

# S7723: Moodle ESLint's no-new-func forbids the Function constructor outright.
# player.js uses a deliberate, documented Function() indirection to hide a native
# dynamic import() from Babel's AMD transform (see the esmImport comment, CC9).
sonar.issue.ignore.multicriteria.e4.ruleKey=javascript:S7723
sonar.issue.ignore.multicriteria.e4.resourceKey=amd/src/**/*.js

# S2486: AMD modules intentionally swallow localStorage/private-mode/selector
# errors (each with an explanatory comment) — these are non-fatal best-effort
# paths, not silently-dropped exceptions.
sonar.issue.ignore.multicriteria.e5.ruleKey=javascript:S2486
sonar.issue.ignore.multicriteria.e5.resourceKey=amd/src/**/*.js

# --- Test sources: reflection + DAMP duplication are standard (see local_fastpix) ---
sonar.issue.ignore.multicriteria.e6.ruleKey=php:S3011
sonar.issue.ignore.multicriteria.e6.resourceKey=tests/**/*.php
sonar.issue.ignore.multicriteria.e7.ruleKey=php:S1192
sonar.issue.ignore.multicriteria.e7.resourceKey=tests/**/*.php

# --- DEFERRED DEBT (not a false positive) ---
# S3776 (cognitive complexity 18 > 15) and S2004 (callback nesting > 4) in
# amd/src/player.js's mount()/coverage-tracker. This code feeds completion +
# grading and is adjacent to the S4 fraud checks; a structural refactor must go
# through @playback-view WITH the M6 PHPUnit/Behat coverage, not a blind lint
# fix. Scoped to player.js only so these rules stay strict elsewhere. TODO:
# refactor with tests, then remove this exclusion.
sonar.issue.ignore.multicriteria.e8.ruleKey=javascript:S3776
sonar.issue.ignore.multicriteria.e8.resourceKey=amd/src/player.js
sonar.issue.ignore.multicriteria.e9.ruleKey=javascript:S2004
sonar.issue.ignore.multicriteria.e9.resourceKey=amd/src/player.js
